<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ציר זמן המהפכה הצרפתית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F6F1E8;color:#1F2A36;overflow:hidden}

/* ── Header ── */
#hdr{position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  background:#17324D;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  box-shadow:0 2px 8px rgba(23,50,77,.35)}
#hdr h1{font-size:1.1em;white-space:nowrap;color:#FFFFFF}
#hdr small{color:rgba(255,255,255,.55);font-size:.75em}
#hdr-r{display:flex;gap:7px;align-items:center;margin-right:auto}
#search{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);
  border-radius:18px;padding:4px 12px;color:#fff;font-size:.8em;width:170px}
#search:focus{outline:none;background:rgba(255,255,255,.22)}
#search::placeholder{color:rgba(255,255,255,.4)}
.zbtn{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);color:#fff;
  width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:1em;
  display:flex;align-items:center;justify-content:center}
.zbtn:hover{background:rgba(255,255,255,.24)}
#cnt{font-size:.72em;color:rgba(255,255,255,.6);white-space:nowrap}

/* ── Filter bar ── */
#fbar{position:fixed;top:54px;left:0;right:0;height:38px;z-index:200;
  background:#F6F1E8;border-bottom:1px solid #CFC6B9;
  display:flex;align-items:center;padding:0 10px;gap:5px;
  overflow-x:auto;direction:ltr}
#fbar::-webkit-scrollbar{height:0}
.fb{padding:3px 11px;border-radius:11px;border:1px solid rgba(0,0,0,.12);cursor:pointer;
  font-size:.7em;font-weight:700;color:#fff;
  opacity:.65;transition:opacity .15s,transform .1s;white-space:nowrap}
.fb.on{opacity:1;transform:scale(1.06);box-shadow:0 2px 7px rgba(0,0,0,.18)}
.fb:hover{opacity:.9}

/* ── Timeline container ── */
#tl{position:fixed;top:92px;bottom:72px;left:0;right:0;overflow:auto;background:#F6F1E8}
#tl::-webkit-scrollbar{width:6px;height:6px;background:#E7DDD1}
#tl::-webkit-scrollbar-thumb{background:#CFC6B9;border-radius:3px}
#tl-in{position:relative}

/* Single global background painting */
#tl-bg{position:absolute;inset:0;z-index:0;
  background-attachment:local;
  background-size:cover;background-position:center top;
  pointer-events:none}
#tl-cream{position:absolute;inset:0;z-index:1;
  background:rgba(246,241,232,0.74);pointer-events:none}

/* ── Era bands (3-layer soft colors) ── */
.band{position:absolute;left:0;z-index:2}
.blabel{position:absolute;top:50%;transform:translateY(-50%);
  right:7px;z-index:6;
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.85);
  padding:4px 10px;border-radius:20px;
  border:1px solid #D8D1C6;
  box-shadow:0 1px 4px rgba(0,0,0,.08)}
.blabel-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.blabel-name{font-size:.72em;font-weight:700;color:#1F2A36;white-space:nowrap}
.blabel-dates{font-size:.58em;color:#5B6470;white-space:nowrap;margin-right:4px}
.baxis{position:absolute;top:50%;left:0;height:1px;background:rgba(0,0,0,.1);z-index:3}

/* ── Year ticks ── */
.ymark{position:absolute;top:0;pointer-events:none;z-index:3}
.ytick{width:1px;background:rgba(0,0,0,.1)}
.ylabel{position:absolute;bottom:-16px;transform:translateX(-50%);
  font-size:.58em;color:#5B6470;white-space:nowrap}

/* ── Event cards ── */
.ev{position:absolute;background:#FFFDFC;border-radius:7px;
  padding:6px 8px;cursor:pointer;z-index:10;
  border:1px solid #D8D1C6;
  box-shadow:0 1px 5px rgba(31,42,54,.1);width:135px;
  transition:transform .12s,box-shadow .12s,opacity .12s}
.ev:hover{transform:scale(1.07) translateY(-2px);z-index:50;
  box-shadow:0 5px 15px rgba(31,42,54,.18);opacity:1!important}
.ev.hide{display:none!important}
.ev-d{font-size:.59em;color:#5B6470;margin-bottom:2px}
.ev-t{font-size:.72em;font-weight:700;color:#1F2A36;line-height:1.3}
.ev-img{width:100%;height:48px;object-fit:cover;border-radius:3px;margin-top:4px;display:block}
.ev.back-row{transform:scale(0.85);transform-origin:top left;
  opacity:0.76;z-index:9;box-shadow:0 1px 2px rgba(31,42,54,.07)}
.ev.tu::after{content:'';position:absolute;bottom:-7px;right:14px;
  border:7px solid transparent;border-top:7px solid #FFFDFC;border-bottom:0}
.ev.td::after{content:'';position:absolute;top:-7px;right:14px;
  border:7px solid transparent;border-bottom:7px solid #FFFDFC;border-top:0}

/* ── Minimap ── */
#mm{position:fixed;bottom:0;left:0;right:0;height:72px;z-index:200;
  background:#6E7A88;border-top:2px solid #17324D;overflow:hidden}
#mm-inner{position:relative;width:100%;height:42px}
#mm canvas{display:block;width:100%;height:42px;position:absolute;top:0;left:0}
#mm-vp{position:absolute;top:0;height:42px;
  background:rgba(255,255,255,.14);
  border:2px solid #FFFFFF;
  box-shadow:0 0 0 1px #B8C1CC;
  pointer-events:none;z-index:10}
#mm-periods{display:flex;align-items:center;height:30px;padding:0 8px;gap:14px;
  overflow:hidden}
.mm-period{display:flex;align-items:center;gap:4px;cursor:default}
.mm-pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mm-plabel{font-size:.58em;color:#F5F7FA;white-space:nowrap;opacity:.9}

/* ── Modal ── */
#modal{display:none;position:fixed;inset:0;background:rgba(23,50,77,.55);z-index:999;
  align-items:center;justify-content:center}
#modal.on{display:flex}
#mbox{background:#FFFDFC;color:#1F2A36;border-radius:12px;
  max-width:570px;width:92%;max-height:88vh;overflow-y:auto;direction:rtl;
  border:1px solid #D8D1C6;box-shadow:0 8px 40px rgba(23,50,77,.28)}
#mhdr{padding:14px 18px;border-radius:12px 12px 0 0;position:relative}
#mclose{position:absolute;top:10px;left:12px;background:rgba(0,0,0,.2);
  border:none;color:#fff;width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:.95em}
#mdate{font-size:.78em;color:rgba(255,255,255,.8);margin-bottom:3px}
#mtitle{font-size:1.2em;font-weight:700;line-height:1.3;color:#fff}
#mbody{padding:16px 18px}
#mbody img{max-width:100%;border-radius:7px;margin:8px 0}
#mcap{font-size:.75em;color:#5B6470;font-style:italic;margin-top:3px}
#mtext{font-size:.86em;line-height:1.75;color:#1F2A36;margin-top:9px;white-space:pre-wrap}
#mtag{display:inline-block;font-size:.7em;font-weight:600;
  border-radius:20px;padding:2px 9px;margin-top:8px;color:#fff}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:#F6F1E8;z-index:500;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading p{color:#5B6470;font-size:.9em}
.spinner{width:36px;height:36px;border:3px solid #D8D1C6;
  border-top-color:#A14E5E;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p id="load-msg">טוען נתונים...</p></div>

<div id="hdr">
  <div>
    <h1>&#127467;&#127479; ציר זמן המהפכה הצרפתית</h1>
    <small>1756 &ndash; 1815</small>
  </div>
  <div id="hdr-r">
    <button class="zbtn" onclick="chZoom(-0.2)">&minus;</button>
    <button class="zbtn" onclick="chZoom(0.2)">+</button>
    <input id="search" type="text" placeholder="חפש..." oninput="filterEvs()">
    <span id="cnt"></span>
  </div>
</div>

<div id="fbar"></div>
<div id="tl"><div id="tl-in"></div></div>

<div id="mm">
  <div id="mm-inner">
    <canvas id="mmc"></canvas>
    <div id="mm-vp"></div>
  </div>
  <div id="mm-periods"></div>
</div>

<div id="modal">
  <div id="mbox">
    <div id="mhdr">
      <button id="mclose" onclick="closeM()">&#10005;</button>
      <div id="mdate"></div><div id="mtitle"></div>
    </div>
    <div id="mbody">
      <img id="mimg" src="" alt="" style="display:none">
      <div id="mcap"></div><div id="mtext"></div>
      <span id="mtag"></span>
    </div>
  </div>
</div>

<script>
(function(){
var EVENTS=[],activeG='all',sq='',PPY=170;
var MIN_Y=1756,MAX_Y=1816,BH=210,LP=220;

/* ── 3-layer soft colors (cycling) ── */
var LAYERS=[
  {bg:'#E9D7D4',label:'#A14E5E',dot:'#8F3D4B'},  /* ורוד-אבן */
  {bg:'#F2E6D3',label:'#C58E3D',dot:'#AD7A2F'},  /* חול-קלף */
  {bg:'#DCE7F2',label:'#5E7C9B',dot:'#4A6988'}   /* כחול-אפור */
];

/* ── Era group keys (must match events.json) ── */
var GC={};
GC['1756-1787 – תהליכים ארוכי טווח']=LAYERS[0].label;
GC['1787  עד מאי 1789 ערב המהפכה']=LAYERS[1].label;
GC['אביב 1789 עד ספטמבר 1791 – השנתיים הראשונות של המהפכה']=LAYERS[2].label;
GC['האספה המחוקקת עד הכרזת הרפובליקה - 1.10.1791 עד ה-22.9.1792']=LAYERS[0].label;
GC['הקונבנט']=LAYERS[1].label;
GC['שלטון\nהטרור']=LAYERS[2].label;
GC['הדירקטוריון']=LAYERS[0].label;
GC['הקונסולט']=LAYERS[1].label;
GC['הקיסרות']=LAYERS[2].label;
var GORDER=Object.keys(GC);

/* ── Display labels & dates ── */
var GLABEL={};
GLABEL['1756-1787 – תהליכים ארוכי טווח']='גורמים ארוכי טווח';
GLABEL['1787  עד מאי 1789 ערב המהפכה']='גורמים קצרי טווח';
GLABEL['אביב 1789 עד ספטמבר 1791 – השנתיים הראשונות של המהפכה']='האספה הלאומית';
GLABEL['האספה המחוקקת עד הכרזת הרפובליקה - 1.10.1791 עד ה-22.9.1792']='האספה המחוקקת';
GLABEL['הקונבנט']='הקונבנט';
GLABEL['שלטון\nהטרור']='שלטון הטרור';
GLABEL['הדירקטוריון']='הדירקטוריון';
GLABEL['הקונסולט']='הקונסולט';
GLABEL['הקיסרות']='הקיסרות';

var GDATES={};
GDATES['1756-1787 – תהליכים ארוכי טווח']='1756–1787';
GDATES['1787  עד מאי 1789 ערב המהפכה']='1787–מאי 1789';
GDATES['אביב 1789 עד ספטמבר 1791 – השנתיים הראשונות של המהפכה']='1789–30.9.1791';
GDATES['האספה המחוקקת עד הכרזת הרפובליקה - 1.10.1791 עד ה-22.9.1792']='1.10.1791–20.9.1792';
GDATES['הקונבנט']='21.9.1792–1.11.1795';
GDATES['שלטון\nהטרור']='יוני 1793–יולי 1794';
GDATES['הדירקטוריון']='2.11.1795–8.11.1799';
GDATES['הקונסולט']='9.11.1799–1.12.1804';
GDATES['הקיסרות']='2.12.1804–18.6.1815';

/* ── Global background image (single painting behind all rows) ── */
var BG_IMG='https://upload.wikimedia.org/wikipedia/commons/c/c7/Convention_nationale_02.jpg';

/* ── Period timeline markers ── */
var PERIODS=[
  {label:'1789–1791 מונרכיה חוקתית',  color:'#D49A2A', y1:1789, y2:1791},
  {label:'1791–1792 האספה המחוקקת',    color:'#88A64E', y1:1791, y2:1792},
  {label:'1792–1793 הרפובליקה',        color:'#4F7FB3', y1:1792, y2:1793},
  {label:'1793–1794 שלטון יעקובני',    color:'#B4455E', y1:1793, y2:1794},
  {label:'1794–1795 התרמידורים',       color:'#B07AA1', y1:1794, y2:1795},
  {label:'1795–1799 הדירקטוריון',      color:'#6FA3A8', y1:1795, y2:1799}
];

function xP(y,mo,d){return(y-MIN_Y+(mo?(mo-1)/12:0)+(d?(d-1)/365:0))*PPY+LP;}
function TW(){return(MAX_Y-MIN_Y)*PPY+LP*2;}
function TH(){return GORDER.length*BH+30;}
function hexA(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  var inn=document.getElementById('tl-in');
  var W=TW(),H=TH();
  inn.style.cssText='position:relative;width:'+W+'px;height:'+H+'px;';
  inn.innerHTML='';

  /* Single background painting */
  var bg=document.createElement('div');
  bg.id='tl-bg';
  bg.style.backgroundImage='url('+BG_IMG+')';
  inn.appendChild(bg);

  /* Cream overlay over painting (74% opacity = painting visible at 26%) */
  var cream=document.createElement('div');
  cream.id='tl-cream';
  inn.appendChild(cream);

  /* Era bands — soft layer color at 38% over cream */
  GORDER.forEach(function(g,gi){
    var layer=LAYERS[gi%3];
    var top=gi*BH;
    var band=document.createElement('div');
    band.className='band';
    band.style.cssText='top:'+top+'px;height:'+BH+'px;width:'+W+'px;'+
      'background:'+hexA(layer.bg,0.50)+';'+
      'border-bottom:1px solid rgba(0,0,0,.06)';

    /* Label pill — right side */
    var lbl=document.createElement('div');lbl.className='blabel';
    var dot=document.createElement('span');dot.className='blabel-dot';
    dot.style.background=layer.dot;
    var dates=document.createElement('span');dates.className='blabel-dates';
    dates.textContent=GDATES[g]||'';
    var nm=document.createElement('span');nm.className='blabel-name';
    nm.textContent=GLABEL[g]||g.replace('\n',' ');
    nm.style.color=layer.label;
    lbl.appendChild(dot);lbl.appendChild(nm);lbl.appendChild(dates);

    var ax=document.createElement('div');ax.className='baxis';ax.style.width=W+'px';
    band.appendChild(lbl);band.appendChild(ax);inn.appendChild(band);
  });

  /* Year ticks */
  for(var yr=MIN_Y;yr<=MAX_Y;yr++){
    var xp=xP(yr);
    var mk=document.createElement('div');mk.className='ymark';mk.style.cssText='left:'+xp+'px;height:'+H+'px;z-index:4';
    var tk=document.createElement('div');tk.className='ytick';tk.style.height=H+'px';
    var yl=document.createElement('div');yl.className='ylabel';yl.textContent=yr;
    mk.appendChild(tk);mk.appendChild(yl);inn.appendChild(mk);
  }

  /* Event cards */
  var shown=0,sqL=sq.toLowerCase();
  EVENTS.forEach(function(ev,i){
    var gi=GORDER.indexOf(ev.grp);if(gi<0)return;
    var mG=activeG==='all'||activeG===ev.grp;
    var mS=!sq||(ev.hl&&ev.hl.toLowerCase().indexOf(sqL)>=0)||
      (ev.tx&&ev.tx.toLowerCase().indexOf(sqL)>=0)||
      (ev.dd&&ev.dd.toLowerCase().indexOf(sqL)>=0);
    var hide=!mG||!mS;
    var posIdx=i%4,front=posIdx<2,bt=gi*BH,cy,tailClass;
    if(posIdx===0){tailClass='tu';cy=bt+4;}
    else if(posIdx===1){tailClass='td';cy=bt+Math.round(BH*0.52)+4;}
    else if(posIdx===2){tailClass='tu';cy=bt+28;}
    else{tailClass='td';cy=bt+Math.round(BH*0.52)+28;}

    var card=document.createElement('div');
    card.className='ev '+tailClass+(front?'':' back-row')+(hide?' hide':'');
    var layer=LAYERS[gi%3];
    card.style.cssText='left:'+xP(ev.y,ev.mo,ev.d)+'px;top:'+cy+'px;border-top:3px solid '+layer.label;
    card.dataset.i=i;
    card.onclick=function(){openM(+this.dataset.i);};
    var h='';
    if(ev.dd)h+='<div class="ev-d">'+esc(ev.dd)+'</div>';
    h+='<div class="ev-t">'+esc(ev.hl)+'</div>';
    if(ev.img)h+='<img class="ev-img" src="'+esc(ev.img)+'" loading="lazy" onerror="this.style.display=\'none\'">';
    card.innerHTML=h;if(!hide)shown++;inn.appendChild(card);
  });

  document.getElementById('cnt').textContent=shown+' אירועים';
  buildPeriods();
  drawMM();
}

function buildPeriods(){
  var cont=document.getElementById('mm-periods');
  if(cont.children.length)return;
  PERIODS.forEach(function(p){
    var el=document.createElement('div');el.className='mm-period';
    var dot=document.createElement('div');dot.className='mm-pdot';dot.style.background=p.color;
    var lbl=document.createElement('span');lbl.className='mm-plabel';lbl.textContent=p.label;
    el.appendChild(dot);el.appendChild(lbl);cont.appendChild(el);
  });
}

function filterEvs(){
  sq=document.getElementById('search').value;
  var sqL=sq.toLowerCase(),shown=0;
  document.querySelectorAll('.ev').forEach(function(card){
    var i=+card.dataset.i,ev=EVENTS[i];
    var mG=activeG==='all'||activeG===ev.grp;
    var mS=!sq||(ev.hl&&ev.hl.toLowerCase().indexOf(sqL)>=0)||
      (ev.tx&&ev.tx.toLowerCase().indexOf(sqL)>=0)||
      (ev.dd&&ev.dd.toLowerCase().indexOf(sqL)>=0);
    if(mG&&mS){card.classList.remove('hide');shown++;}else card.classList.add('hide');
  });
  document.getElementById('cnt').textContent=shown+' אירועים';
  drawMM();
}

function setG(g,btn){
  activeG=g;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');filterEvs();
}
window.setG=setG;
window.chZoom=function(d){PPY=Math.max(60,Math.min(500,PPY+d*PPY));render();};
window.filterEvs=filterEvs;
window.closeM=function(){document.getElementById('modal').classList.remove('on');};

function openM(i){
  var ev=EVENTS[i];
  var gi=GORDER.indexOf(ev.grp);
  var layer=gi>=0?LAYERS[gi%3]:LAYERS[0];
  var mhdr=document.getElementById('mhdr');
  mhdr.style.background=layer.label;
  document.getElementById('mdate').textContent=ev.dd||'';
  document.getElementById('mtitle').textContent=ev.hl||'';
  var img=document.getElementById('mimg');
  if(ev.img){img.src=ev.img;img.style.display='block';}else img.style.display='none';
  document.getElementById('mcap').textContent=ev.cap||'';
  document.getElementById('mtext').textContent=ev.tx||'';
  var tag=document.getElementById('mtag');
  tag.textContent=GLABEL[ev.grp]||(ev.grp||'').replace('\n',' ');
  tag.style.background=layer.dot;
  document.getElementById('modal').classList.add('on');
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)window.closeM();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')window.closeM();});

function drawMM(){
  var tl=document.getElementById('tl');
  var mmInner=document.getElementById('mm-inner');
  var cvs=document.getElementById('mmc');
  var W=mmInner.offsetWidth||window.innerWidth,H=42;
  cvs.width=W;cvs.height=H;
  var ctx=cvs.getContext('2d');
  ctx.fillStyle='#6E7A88';ctx.fillRect(0,0,W,H);
  var totalw=TW(),bh=H/GORDER.length;

  /* Band strips */
  GORDER.forEach(function(g,gi){
    var col=LAYERS[gi%3].label;
    var r=parseInt(col.slice(1,3),16),gr=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    ctx.fillStyle='rgba('+r+','+gr+','+b+',0.45)';ctx.fillRect(0,gi*bh,W,bh);
  });

  /* Period color spans on timeline */
  PERIODS.forEach(function(p){
    var px1=(p.y1-MIN_Y)/( MAX_Y-MIN_Y)*W;
    var px2=(p.y2-MIN_Y)/(MAX_Y-MIN_Y)*W;
    ctx.fillStyle=p.color+'55';
    ctx.fillRect(px1,H-6,px2-px1,6);
  });

  /* Event dots */
  var sqL=sq.toLowerCase();
  EVENTS.forEach(function(ev){
    var gi=GORDER.indexOf(ev.grp);if(gi<0)return;
    var mG=activeG==='all'||activeG===ev.grp;
    var mS=!sq||(ev.hl&&ev.hl.toLowerCase().indexOf(sqL)>=0)||(ev.tx&&ev.tx.toLowerCase().indexOf(sqL)>=0);
    if(!mG||!mS)return;
    var ex=xP(ev.y,ev.mo,ev.d),mx=(ex/totalw)*W,my=(gi+0.5)/GORDER.length*H;
    var col=LAYERS[gi%3].dot;
    var r=parseInt(col.slice(1,3),16),gr=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    ctx.fillStyle='rgba('+r+','+gr+','+b+',0.95)';
    ctx.beginPath();ctx.arc(mx,my,2.2,0,6.28);ctx.fill();
  });

  /* Viewport indicator */
  var sx=tl.scrollLeft,vw=tl.clientWidth;
  var vp=document.getElementById('mm-vp');
  vp.style.left=Math.round((sx/totalw)*W)+'px';
  vp.style.width=Math.max(10,Math.round((vw/totalw)*W))+'px';

  /* Year labels — build once */
  var yDiv=document.getElementById('mm-years');
  if(!yDiv&&false){}// no separate years div now
}

document.getElementById('mmc').addEventListener('click',function(e){
  var rect=this.getBoundingClientRect(),ratio=(e.clientX-rect.left)/rect.width;
  var tl=document.getElementById('tl');
  tl.scrollLeft=ratio*TW()-tl.clientWidth/2;drawMM();
});
document.getElementById('tl').addEventListener('scroll',drawMM);
window.addEventListener('resize',function(){render();drawMM();});

function buildFBtns(){
  var fbar=document.getElementById('fbar');fbar.innerHTML='';
  var allBtn=document.createElement('button');allBtn.className='fb on';
  allBtn.onclick=function(){setG('all',this);};
  allBtn.style.background='#17324D';allBtn.textContent='הכל';
  fbar.appendChild(allBtn);
  GORDER.forEach(function(g,gi){
    var btn=document.createElement('button');btn.className='fb';btn.dataset.g=g;
    btn.onclick=function(){setG(this.dataset.g,this);};
    var layer=LAYERS[gi%3];
    btn.style.background=layer.label;
    btn.textContent=(GLABEL[g]||g.replace('\n',' ')).substring(0,35);
    fbar.appendChild(btn);
  });
}

fetch('events.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(data){
    EVENTS=data;
    document.getElementById('loading').style.display='none';
    buildFBtns();render();
    var tl=document.getElementById('tl');
    setTimeout(function(){tl.scrollLeft=Math.max(0,xP(1789)-tl.clientWidth*0.3);drawMM();},80);
  })
  .catch(function(err){
    document.getElementById('load-msg').textContent='שגיאה: '+err.message;
    document.querySelector('.spinner').style.display='none';
  });
})();
</script>
</body>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ציר זמן המהפכה הצרפתית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0d1117;color:#fff;overflow:hidden}
#hdr{position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  background:linear-gradient(90deg,#7b1d2e,#3d0f1a);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.6)}
#hdr h1{font-size:1.1em;white-space:nowrap}
#hdr small{opacity:.7;font-size:.75em}
#hdr-r{display:flex;gap:7px;align-items:center;margin-right:auto}
#search{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
  border-radius:18px;padding:4px 12px;color:#fff;font-size:.8em;width:170px}
#search:focus{outline:none;background:rgba(255,255,255,.28)}
#search::placeholder{color:rgba(255,255,255,.5)}
.zbtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
  color:#fff;width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:1em;
  display:flex;align-items:center;justify-content:center}
.zbtn:hover{background:rgba(255,255,255,.35)}
#cnt{font-size:.72em;opacity:.65;white-space:nowrap}
#fbar{position:fixed;top:54px;left:0;right:0;height:38px;z-index:200;
  background:rgba(0,0,0,.6);border-bottom:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;padding:0 10px;gap:5px;
  overflow-x:auto;direction:ltr}
#fbar::-webkit-scrollbar{height:0}
.fb{padding:3px 11px;border-radius:11px;border:1.5px solid rgba(255,255,255,.15);
  cursor:pointer;font-size:.7em;font-weight:700;color:#fff;
  opacity:.5;transition:opacity .15s,border-color .15s;white-space:nowrap}
.fb.on{opacity:1;border-color:rgba(255,255,255,.5)}
#tl{position:fixed;top:92px;bottom:58px;left:0;right:0;overflow:auto;background:#0d1117}
#tl::-webkit-scrollbar{width:6px;height:6px;background:rgba(255,255,255,.04)}
#tl::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
#tl-in{position:relative}
.band{position:absolute;left:0}
.blabel{position:absolute;top:50%;transform:translateY(-50%);
  right:6px;font-size:.68em;font-weight:700;color:rgba(255,255,255,.9);
  background:rgba(0,0,0,.4);padding:2px 6px;border-radius:3px;
  white-space:nowrap;z-index:5;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.baxis{position:absolute;top:50%;left:0;height:1px;
  background:rgba(255,255,255,.15);z-index:1}
.ymark{position:absolute;top:0;pointer-events:none;z-index:2}
.ytick{width:1px;background:rgba(255,255,255,.15)}
.ylabel{position:absolute;bottom:-16px;transform:translateX(-50%);
  font-size:.58em;color:rgba(255,255,255,.45);white-space:nowrap}
.ev{position:absolute;background:#fff;border-radius:6px;
  padding:6px 8px;cursor:pointer;z-index:10;
  box-shadow:0 2px 7px rgba(0,0,0,.4);width:160px;
  transition:transform .12s,box-shadow .12s}
.ev:hover{transform:scale(1.06) translateY(-2px);z-index:50;
  box-shadow:0 6px 18px rgba(0,0,0,.5)}
.ev.hide{display:none !important}
.ev-d{font-size:.6em;color:#777;margin-bottom:2px}
.ev-t{font-size:.74em;font-weight:700;color:#111;line-height:1.3}
.ev-img{width:100%;height:50px;object-fit:cover;border-radius:3px;margin-top:4px;display:block}
.ev.tu::after{content:'';position:absolute;bottom:-7px;right:16px;
  border:7px solid transparent;border-top:7px solid #fff;border-bottom:0}
.ev.td::after{content:'';position:absolute;top:-7px;right:16px;
  border:7px solid transparent;border-bottom:7px solid #fff;border-top:0}
#mm{position:fixed;bottom:0;left:0;right:0;height:58px;z-index:200;
  background:rgba(0,0,0,.8);border-top:1px solid rgba(255,255,255,.15)}
#mm canvas{display:block;width:100%;height:42px}
#mm-years{display:flex;justify-content:space-between;padding:1px 8px;opacity:.45;font-size:.6em}
#mm-vp{position:absolute;top:0;height:42px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.35);pointer-events:none}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;
  align-items:center;justify-content:center}
#modal.on{display:flex}
#mbox{background:#fff;color:#111;border-radius:12px;
  max-width:570px;width:92%;max-height:88vh;overflow-y:auto;direction:rtl}
#mhdr{padding:14px 18px;border-radius:12px 12px 0 0;position:relative}
#mclose{position:absolute;top:10px;left:12px;background:rgba(0,0,0,.25);
  border:none;color:#fff;width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:.95em}
#mdate{font-size:.78em;opacity:.85;margin-bottom:3px}
#mtitle{font-size:1.2em;font-weight:700;line-height:1.3}
#mbody{padding:16px 18px}
#mbody img{max-width:100%;border-radius:7px;margin:8px 0}
#mcap{font-size:.75em;color:#888;font-style:italic;margin-top:3px}
#mtext{font-size:.86em;line-height:1.75;color:#333;margin-top:9px;white-space:pre-wrap}
#mtag{display:inline-block;font-size:.7em;font-weight:600;
  border-radius:20px;padding:2px 9px;margin-top:8px;color:#fff}
#loading{position:fixed;inset:0;background:#0d1117;z-index:500;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading p{color:rgba(255,255,255,.7);font-size:.9em}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);
  border-top-color:#c0392b;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="load-msg">טוען נתונים...</p>
</div>

<div id="hdr">
  <div>
    <h1>&#127467;&#127479; ציר זמן המהפכה הצרפתית</h1>
    <small>1756 &ndash; 1815</small>
  </div>
  <div id="hdr-r">
    <button class="zbtn" onclick="chZoom(-0.2)">&minus;</button>
    <button class="zbtn" onclick="chZoom(0.2)">+</button>
    <input id="search" type="text" placeholder="חפש..." oninput="filterEvs()">
    <span id="cnt"></span>
  </div>
</div>

<div id="fbar"></div>
<div id="tl"><div id="tl-in"></div></div>

<div id="mm">
  <canvas id="mmc"></canvas>
  <div id="mm-years"></div>
  <div id="mm-vp"></div>
</div>

<div id="modal">
  <div id="mbox">
    <div id="mhdr">
      <button id="mclose" onclick="closeM()">&#10005;</button>
      <div id="mdate"></div>
      <div id="mtitle"></div>
    </div>
    <div id="mbody">
      <img id="mimg" src="" alt="" style="display:none">
      <div id="mcap"></div>
      <div id="mtext"></div>
      <span id="mtag"></span>
    </div>
  </div>
</div>

<script>
(function(){
var EVENTS=[],activeG='all',sq='',PPY=170;
var MIN_Y=1756,MAX_Y=1816,BH=180,LP=220;
var GC={};
GC['1756-1787 – תהליכים ארוכי טווח']='#6B4C7A';
GC['1787  עד מאי 1789 ערב המהפכה']='#7A4A3A';
GC['אביב 1789 עד ספטמבר 1791 – השנתיים הראשונות של המהפכה']='#8B2535';
GC['האספה המחוקקת עד הכרזת הרפובליקה - 1.10.1791 עד ה-22.9.1792']='#4A6B8A';
GC['הקונבנט']='#2A5A8A';
GC['שלטון\nהטרור']='#8A2020';
GC['הדירקטוריון']='#3A6A5A';
GC['הקונסולט']='#7A5A20';
GC['הקיסרות']='#3A3A7A';
var GORDER=Object.keys(GC);

function xP(y,mo,d){return(y-MIN_Y+(mo?(mo-1)/12:0)+(d?(d-1)/365:0))*PPY+LP;}
function TW(){return(MAX_Y-MIN_Y)*PPY+LP*2;}
function TH(){return GORDER.length*BH+30;}
function hexA(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  var inn=document.getElementById('tl-in');
  var W=TW(),H=TH();
  inn.style.cssText='position:relative;width:'+W+'px;height:'+H+'px;';
  inn.innerHTML='';
  GORDER.forEach(function(g,gi){
    var top=gi*BH,col=GC[g];
    var band=document.createElement('div');
    band.className='band';
    band.style.cssText='top:'+top+'px;height:'+BH+'px;width:'+W+'px;background:'+hexA(col,gi%2===0?0.13:0.09)+';border-bottom:1px solid rgba(255,255,255,.07)';
    var lbl=document.createElement('div');lbl.className='blabel';lbl.textContent=g.replace('\n',' ');
    var ax=document.createElement('div');ax.className='baxis';ax.style.width=W+'px';
    band.appendChild(lbl);band.appendChild(ax);inn.appendChild(band);
  });
  for(var yr=MIN_Y;yr<=MAX_Y;yr++){
    var xp=xP(yr);
    var mk=document.createElement('div');mk.className='ymark';mk.style.cssText='left:'+xp+'px;height:'+H+'px';
    var tk=document.createElement('div');tk.className='ytick';tk.style.height=H+'px';
    var yl=document.createElement('div');yl.className='ylabel';yl.textContent=yr;
    mk.appendChild(tk);mk.appendChild(yl);inn.appendChild(mk);
  }
  var shown=0,sqL=sq.toLowerCase();
  EVENTS.forEach(function(ev,i){
    var gi=GORDER.indexOf(ev.grp);if(gi<0)return;
    var mG=activeG==='all'||activeG===ev.grp;
    var mS=!sq||(ev.hl&&ev.hl.toLowerCase().indexOf(sqL)>=0)||(ev.tx&&ev.tx.toLowerCase().indexOf(sqL)>=0)||(ev.dd&&ev.dd.toLowerCase().indexOf(sqL)>=0);
    var hide=!mG||!mS;
    var cx=xP(ev.y,ev.mo,ev.d),bt=gi*BH,up=i%2===0,cy=up?bt+8:bt+BH/2+8;
    var card=document.createElement('div');
    card.className='ev '+(up?'tu':'td')+(hide?' hide':'');
    card.style.cssText='left:'+cx+'px;top:'+cy+'px;border-top:3px solid '+GC[ev.grp];
    card.dataset.i=i;
    card.onclick=function(){openM(+this.dataset.i);};
    var h='';
    if(ev.dd)h+='<div class="ev-d">'+esc(ev.dd)+'</div>';
    h+='<div class="ev-t">'+esc(ev.hl)+'</div>';
    if(ev.img)h+='<img class="ev-img" src="'+esc(ev.img)+'" loading="lazy" onerror="this.style.display=\'none\'">';
    card.innerHTML=h;if(!hide)shown++;inn.appendChild(card);
  });
  document.getElementById('cnt').textContent=shown+' אירועים';
  drawMM();
}

function filterEvs(){
  sq=document.getElementById('search').value;
  var sqL=sq.toLowerCase(),shown=0;
  document.querySelectorAll('.ev').forEach(function(card){
    var i=+card.dataset.i,ev=EVENTS[i];
    var mG=activeG==='all'||activeG===ev.grp;
    var mS=!sq||(ev.hl&&ev.hl.toLowerCase().indexOf(sqL)>=0)||(ev.tx&&ev.tx.toLowerCase().indexOf(sqL)>=0)||(ev.dd&&ev.dd.toLowerCase().indexOf(sqL)>=0);
    if(mG&&mS){card.classList.remove('hide');shown++;}else card.classList.add('hide');
  });
  document.getElementById('cnt').textContent=shown+' אירועים';
  drawMM();
}

function setG(g,btn){
  activeG=g;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');filterEvs();
}
window.setG=setG;
window.chZoom=function(d){PPY=Math.max(60,Math.min(500,PPY+d*PPY));render();};
window.filterEvs=filterEvs;
window.closeM=function(){document.getElementById('modal').classList.remove('on');};

function openM(i){
  var ev=EVENTS[i],col=GC[ev.grp]||'#555';
  var mhdr=document.getElementById('mhdr');mhdr.style.background=col;mhdr.style.color='#fff';
  document.getElementById('mdate').textContent=ev.dd||'';
  document.getElementById('mtitle').textContent=ev.hl||'';
  var img=document.getElementById('mimg');
  if(ev.img){img.src=ev.img;img.style.display='block';}else img.style.display='none';
  document.getElementById('mcap').textContent=ev.cap||'';
  document.getElementById('mtext').textContent=ev.tx||'';
  var tag=document.getElementById('mtag');tag.textContent=(ev.grp||'').replace('\n',' ');tag.style.background=col;
  document.getElementById('modal').classList.add('on');
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)window.closeM();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')window.closeM();});

function drawMM(){
  var tl=document.getElementById('tl');
  var cvs=document.getElementById('mmc');
  var W=cvs.offsetWidth||window.innerWidth,H=42;
  cvs.width=W;cvs.height=H;
  var ctx=cvs.getContext('2d');ctx.clearRect(0,0,W,H);
  var totalw=TW(),bh=H/GORDER.length;
  GORDER.forEach(function(g,gi){
    var col=GC[g],r=parseInt(col.slice(1,3),16),gr=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    ctx.fillStyle='rgba('+r+','+gr+','+b+',0.4)';ctx.fillRect(0,gi*bh,W,bh);
  });
  var sqL=sq.toLowerCase();
  EVENTS.forEach(function(ev){
    var gi=GORDER.indexOf(ev.grp);if(gi<0)return;
    var mG=activeG==='all'||activeG===ev.grp;
    var mS=!sq||(ev.hl&&ev.hl.toLowerCase().indexOf(sqL)>=0)||(ev.tx&&ev.tx.toLowerCase().indexOf(sqL)>=0);
    if(!mG||!mS)return;
    var ex=xP(ev.y,ev.mo,ev.d),mx=(ex/totalw)*W,my=(gi+0.5)/GORDER.length*H;
    ctx.fillStyle=GC[ev.grp];ctx.beginPath();ctx.arc(mx,my,2,0,6.28);ctx.fill();
  });
  var sx=tl.scrollLeft,vw=tl.clientWidth;
  var vp=document.getElementById('mm-vp');
  vp.style.left=((sx/totalw)*W)+'px';vp.style.width=((vw/totalw)*W)+'px';
  var yDiv=document.getElementById('mm-years');
  if(!yDiv.children.length){for(var yr=MIN_Y;yr<=MAX_Y;yr+=5){var sp=document.createElement('span');sp.textContent=yr;yDiv.appendChild(sp);}}
}

document.getElementById('mmc').addEventListener('click',function(e){
  var rect=this.getBoundingClientRect(),ratio=(e.clientX-rect.left)/rect.width;
  var tl=document.getElementById('tl');tl.scrollLeft=ratio*TW()-tl.clientWidth/2;drawMM();
});
document.getElementById('tl').addEventListener('scroll',drawMM);
window.addEventListener('resize',function(){render();});

function buildFBtns(){
  var fbar=document.getElementById('fbar');fbar.innerHTML='';
  var allBtn=document.createElement('button');allBtn.className='fb on';allBtn.dataset.g='all';
  allBtn.onclick=function(){setG('all',this);};allBtn.style.background='#555';allBtn.textContent='הכל';
  fbar.appendChild(allBtn);
  GORDER.forEach(function(g){
    var btn=document.createElement('button');btn.className='fb';btn.dataset.g=g;
    btn.onclick=function(){setG(this.dataset.g,this);};btn.style.background=GC[g];
    btn.textContent=g.replace('\n',' ').substring(0,45);fbar.appendChild(btn);
  });
}

fetch('events.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(data){
    EVENTS=data;
    document.getElementById('loading').style.display='none';
    buildFBtns();render();
    var tl=document.getElementById('tl');
    setTimeout(function(){tl.scrollLeft=Math.max(0,xP(1789)-tl.clientWidth*0.3);drawMM();},50);
  })
  .catch(function(err){
    document.getElementById('load-msg').textContent='שגיאה: '+err.message;
    document.querySelector('.spinner').style.display='none';
  });
})();
</script>
</body>
</html>
